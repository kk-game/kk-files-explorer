<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>文件管理器</title>
    <link rel="stylesheet" type="text/css" href="./static/style.css"/>
</head>

<body>

<div class="container">
    <h2>📂 kk-file-explorer</h2>

    <!-- 添加秘钥输入框 -->
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px;">
        <span style="font-size: 16px; color: #333;">填写秘钥:</span>
        <label id="secret-key"><input id="secret-value" type="text" placeholder="请输入秘钥"></label>
        <button onclick="saveSecretKey()"
                style="padding: 8px 12px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px;">
            填写
        </button>
    </div>

    <div class="nav-buttons">
        <button onclick="goUp()">返回上一级</button>
        <span id="current-path">当前路径：/</span>
    </div>

    <!-- 弹出框容器 -->
    <div id="rename-modal">
        <div id="rename-container">
            <label for="new-name">请输入新名称:</label>
            <input id="new-name" type="text" placeholder="请输入新的名称"/>
            <button onclick="renameFile()" id="confirm-rename-btn">修改</button>
            <button onclick="closeRenameModal()">取消</button>
        </div>
    </div>


    <ul id="file-list"></ul>
    <button id="clean-btn">清空文件</button>
    <div id="drop-area">📥 拖拽文件或文件夹到这里</div>
    <ul id="upload-list"></ul>
    <button id="upload-btn">⬆️ 开始上传</button>
    <div id="progress">
        <div id="progress-bar"></div>
    </div>
    <div id="upload-speed" style="font-size:13px; color:#555; margin-top:4px;"></div>
    <div id="upload-status">✅ 上传完成！</div>


</div>
<div id="context-menu" style="display: none; position: absolute; z-index: 1000; background: white; border: 1px solid #ccc; border-radius: 5px; box-shadow: 2px 2px 10px rgba(0,0,0,0.2); width: 130px;">
    <ul style="list-style: none; margin: 0; padding: 5px 0;">
        <li onclick="handleDownload()" style="padding: 8px 10px; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.backgroundColor='#686868'" onmouseout="this.style.backgroundColor='transparent'">📥 下载文件</li>
        <li onclick="handleCopyLink()" style="padding: 8px 10px; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.backgroundColor='#686868'" onmouseout="this.style.backgroundColor='transparent'">🔗 复制链接</li>
    </ul>
</div>
<script src="static/main.js"></script>
</body>

</html>
